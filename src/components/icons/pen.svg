<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Pen body: an off-axis, asymmetric quadrilateral, slightly tilted -->
  <path d="M 4 19 L 6 16 L 17 7 L 15 9 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Pen nib: a short line extending from the pen body, maintaining the tilt -->
  <line x1="17" y1="7" x2="19" y2="5" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Orange accent: a small square (4x4px) at the writing tip, semantically indicating the "ink" or "active" point -->
  <rect x="17" y="3" width="4" height="4" fill="#FF4F1F"/>
</svg>